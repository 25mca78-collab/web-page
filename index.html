<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Tea Shop</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to Our Tea Shop!</h1>
    </header>
    <div class="tea-list">
        <div class="tea-item">
            <h2>Green Tea</h2>
            <p>A refreshing drink packed with antioxidants.</p>
            <button onclick="addToCart('Green Tea')">Add to Cart</button>
        </div>
        <div class="tea-item">
            <h2>Black Tea</h2>
            <p>Rich and bold, perfect for any time of day.</p>
            <button onclick="addToCart('Black Tea')">Add to Cart</button>
        </div>
        <div class="tea-item">
            <h2>Herbal Tea</h2>
            <p>Relaxing and caffeine-free option.</p>
            <button onclick="addToCart('Herbal Tea')">Add to Cart</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
